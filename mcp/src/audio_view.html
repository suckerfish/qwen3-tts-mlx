<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Qwen3-TTS Player</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    padding: 16px;
    color: #e4e4e7;
    background: #18181b;
  }
  .player-wrap {
    display: flex;
    flex-direction: column;
    gap: 14px;
    max-width: 520px;
  }

  /* Progress bar */
  .progress-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .time {
    font-size: 12px;
    color: #a1a1aa;
    min-width: 38px;
    text-align: center;
    font-variant-numeric: tabular-nums;
  }
  .progress-bar {
    flex: 1;
    height: 6px;
    background: #3f3f46;
    border-radius: 3px;
    cursor: pointer;
    position: relative;
  }
  .progress-fill {
    height: 100%;
    background: #60a5fa;
    border-radius: 3px;
    width: 0%;
    pointer-events: none;
  }

  /* Controls row */
  .controls {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .btn {
    background: #27272a;
    border: 1px solid #3f3f46;
    color: #e4e4e7;
    border-radius: 6px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
  }
  .btn:hover { background: #3f3f46; }
  .btn:active { background: #52525b; }
  .btn-play {
    width: 44px;
    height: 44px;
    border-radius: 50%;
  }
  .btn-play svg { width: 20px; height: 20px; fill: #e4e4e7; }
  .btn-sm {
    height: 32px;
    padding: 0 10px;
    font-size: 12px;
    font-weight: 500;
  }
  .btn-sm.active {
    background: #60a5fa;
    border-color: #60a5fa;
    color: #18181b;
  }
  .btn-sm svg { width: 14px; height: 14px; fill: currentColor; }

  .spacer { flex: 1; }

  /* Volume */
  .volume-wrap {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .volume-wrap svg { width: 16px; height: 16px; fill: #a1a1aa; }
  .volume-slider {
    width: 70px;
    height: 4px;
    -webkit-appearance: none;
    appearance: none;
    background: #3f3f46;
    border-radius: 2px;
    outline: none;
  }
  .volume-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: #e4e4e7;
    cursor: pointer;
  }

  /* Meta & download */
  .meta {
    font-size: 13px;
    color: #a1a1aa;
  }
  .meta span { color: #e4e4e7; }
  .download-btn {
    gap: 6px;
    color: #60a5fa;
    border-color: #60a5fa33;
  }
  .download-btn:hover { background: #60a5fa22; }

  .status {
    font-size: 13px;
    color: #71717a;
  }
  .error {
    font-size: 13px;
    color: #f87171;
  }
</style>
</head>
<body>
<div class="player-wrap">
  <div id="status" class="status">Waiting for audio...</div>

  <div id="content" style="display:none">
    <!-- Hidden native audio element -->
    <audio id="player" preload="auto"></audio>

    <!-- Progress -->
    <div class="progress-row">
      <span class="time" id="current">0:00</span>
      <div class="progress-bar" id="progressBar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <span class="time" id="duration">0:00</span>
    </div>

    <!-- Controls -->
    <div class="controls">
      <button class="btn btn-play" id="playBtn" title="Play/Pause">
        <svg id="playIcon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        <svg id="pauseIcon" viewBox="0 0 24 24" style="display:none"><path d="M6 4h4v16H6zm8 0h4v16h-4z"/></svg>
      </button>

      <button class="btn btn-sm" data-speed="0.5">0.5x</button>
      <button class="btn btn-sm active" data-speed="1">1x</button>
      <button class="btn btn-sm" data-speed="1.5">1.5x</button>
      <button class="btn btn-sm" data-speed="2">2x</button>

      <div class="spacer"></div>

      <div class="volume-wrap">
        <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0014 8.5v7a4.47 4.47 0 002.5-3.5z"/></svg>
        <input type="range" class="volume-slider" id="volume" min="0" max="1" step="0.05" value="1">
      </div>

      <button class="btn btn-sm download-btn" id="downloadBtn" title="Download WAV">
        <svg viewBox="0 0 16 16"><path d="M8 12l-4-4h2.5V2h3v6H12L8 12zm-6 2h12v1.5H2V14z"/></svg>
        Save
      </button>
    </div>

    <!-- Metadata -->
    <div class="meta" id="info"></div>
  </div>

  <div id="error" class="error" style="display:none"></div>
</div>

<script type="module">
import { App } from "https://unpkg.com/@modelcontextprotocol/ext-apps@0.4.0/app-with-deps";

const mcpApp = new App({ name: "Qwen3-TTS Player", version: "1.0.0" });
const TOOL_PREFIXES = ["", "qwen3-tts-mcp__"];

const player = document.getElementById("player");
let currentBlobUrl = null;
let currentFilename = "output.wav";

// --- UI helpers ---

function fmt(s) {
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return m + ":" + String(sec).padStart(2, "0");
}

function showContent() {
  document.getElementById("status").style.display = "none";
  document.getElementById("error").style.display = "none";
  const el = document.getElementById("content");
  el.style.display = "flex";
  el.style.flexDirection = "column";
  el.style.gap = "14px";
}

function showError(msg) {
  document.getElementById("status").style.display = "none";
  document.getElementById("error").textContent = msg;
  document.getElementById("error").style.display = "block";
}

// --- Player controls ---

document.getElementById("playBtn").onclick = () => {
  if (player.paused) player.play(); else player.pause();
};

player.addEventListener("play", () => {
  document.getElementById("playIcon").style.display = "none";
  document.getElementById("pauseIcon").style.display = "block";
});
player.addEventListener("pause", () => {
  document.getElementById("playIcon").style.display = "block";
  document.getElementById("pauseIcon").style.display = "none";
});

player.addEventListener("timeupdate", () => {
  document.getElementById("current").textContent = fmt(player.currentTime);
  if (player.duration) {
    const pct = (player.currentTime / player.duration) * 100;
    document.getElementById("progressFill").style.width = pct + "%";
  }
});
player.addEventListener("loadedmetadata", () => {
  document.getElementById("duration").textContent = fmt(player.duration);
});

// Click to seek
document.getElementById("progressBar").onclick = (e) => {
  const rect = e.currentTarget.getBoundingClientRect();
  const pct = (e.clientX - rect.left) / rect.width;
  if (player.duration) player.currentTime = pct * player.duration;
};

// Speed buttons
document.querySelectorAll("[data-speed]").forEach(btn => {
  btn.onclick = () => {
    player.playbackRate = parseFloat(btn.dataset.speed);
    document.querySelectorAll("[data-speed]").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
  };
});

// Volume
document.getElementById("volume").oninput = (e) => {
  player.volume = parseFloat(e.target.value);
};

// Download via blob URL
document.getElementById("downloadBtn").onclick = () => {
  if (!currentBlobUrl) return;
  const a = document.createElement("a");
  a.href = currentBlobUrl;
  a.download = currentFilename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
};

// --- Audio loading via callServerTool ---

async function callAudioTool(toolName, filename) {
  const result = await mcpApp.callServerTool({
    name: toolName,
    arguments: { filename },
  });
  if (result?.isError) {
    throw new Error(result?.content?.[0]?.text || "Unknown error");
  }
  const audioText = result?.content?.find(c => c.type === "text");
  if (!audioText?.text || !audioText.text.startsWith("{")) {
    throw new Error(audioText?.text || "No audio data");
  }
  const audioData = JSON.parse(audioText.text);
  if (!audioData.audio_b64) throw new Error("No audio data in response");

  const byteChars = atob(audioData.audio_b64);
  const bytes = new Uint8Array(byteChars.length);
  for (let i = 0; i < byteChars.length; i++) {
    bytes[i] = byteChars.charCodeAt(i);
  }
  return new Blob([bytes], { type: "audio/wav" });
}

async function loadAudio(filename) {
  for (const prefix of TOOL_PREFIXES) {
    try {
      return await callAudioTool(prefix + "get_audio_data", filename);
    } catch { /* try next */ }
  }
  throw new Error("Could not load audio");
}

// --- MCP App event ---

mcpApp.ontoolresult = async ({ content }) => {
  const text = content?.find(c => c.type === "text");
  if (!text?.text) return;

  let data;
  try { data = JSON.parse(text.text); } catch { return; }

  const info = document.getElementById("info");
  const parts = [];
  if (data.voice) parts.push(`Voice: <span>${data.voice}</span>`);
  if (data.instruct) parts.push(`Style: <span>${data.instruct}</span>`);
  if (data.filename) parts.push(`File: <span>${data.filename}</span>`);
  info.innerHTML = parts.join(" &middot; ");

  document.getElementById("status").textContent = "Loading audio...";
  currentFilename = data.filename || "output.wav";

  try {
    const blob = await loadAudio(data.filename);
    if (currentBlobUrl) URL.revokeObjectURL(currentBlobUrl);
    currentBlobUrl = URL.createObjectURL(blob);
    player.src = currentBlobUrl;
    player.play();
    showContent();
  } catch (err) {
    showError(err.message);
  }
};

await mcpApp.connect();
</script>
</body>
</html>
