<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Qwen3-TTS Player</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    padding: 16px;
    color: #e4e4e7;
    background: #18181b;
  }
  .player-wrap {
    display: flex;
    flex-direction: column;
    gap: 12px;
    max-width: 480px;
  }
  audio {
    width: 100%;
    height: 40px;
  }
  .meta {
    font-size: 13px;
    color: #a1a1aa;
  }
  .meta span { color: #e4e4e7; }
  .download {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: #60a5fa;
    text-decoration: none;
    cursor: pointer;
  }
  .download:hover { text-decoration: underline; }
  .download svg {
    width: 14px;
    height: 14px;
    fill: currentColor;
  }
  .status {
    font-size: 13px;
    color: #71717a;
  }
  .error {
    font-size: 13px;
    color: #f87171;
    word-break: break-all;
  }
  .debug {
    font-size: 11px;
    color: #52525b;
    word-break: break-all;
    max-height: 80px;
    overflow: auto;
  }
</style>
</head>
<body>
<div class="player-wrap">
  <div id="status" class="status">Waiting for audio...</div>
  <div id="content" style="display:none">
    <audio id="player" controls autoplay></audio>
    <div class="meta" id="info"></div>
    <a id="download" class="download">
      <svg viewBox="0 0 16 16"><path d="M8 12l-4-4h2.5V2h3v6H12L8 12zm-6 2h12v1.5H2V14z"/></svg>
      <span>Download WAV</span>
    </a>
  </div>
  <div id="error" class="error" style="display:none"></div>
  <div id="debug" class="debug" style="display:none"></div>
</div>

<script type="module">
import { App } from "https://unpkg.com/@modelcontextprotocol/ext-apps@0.4.0/app-with-deps";

const app = new App({ name: "Qwen3-TTS Player", version: "1.0.0" });

function log(msg) {
  const el = document.getElementById("debug");
  el.style.display = "block";
  el.textContent += msg + "\n";
}

function showContent() {
  document.getElementById("status").style.display = "none";
  document.getElementById("error").style.display = "none";
  const el = document.getElementById("content");
  el.style.display = "flex";
  el.style.flexDirection = "column";
  el.style.gap = "12px";
}

function showError(msg) {
  document.getElementById("status").style.display = "none";
  const el = document.getElementById("error");
  el.textContent = msg;
  el.style.display = "block";
}

function setBlobAudio(blobUrl, filename) {
  document.getElementById("player").src = blobUrl;
  const dl = document.getElementById("download");
  dl.onclick = (e) => {
    e.preventDefault();
    const a = document.createElement("a");
    a.href = blobUrl;
    a.download = filename || "output.wav";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  };
  showContent();
}

// Known MCP aggregator prefixes to try for tool name resolution
const TOOL_PREFIXES = ["", "qwen3-tts-mcp__"];

async function callAudioTool(toolName, filename) {
  log("Trying callServerTool: " + toolName);
  const result = await app.callServerTool({
    name: toolName,
    arguments: { filename },
  });
  log("result: " + JSON.stringify(result).slice(0, 200));

  if (result?.isError) {
    const msg = result?.content?.[0]?.text || "Unknown error";
    throw new Error(msg);
  }

  const audioText = result?.content?.find(c => c.type === "text");
  if (!audioText?.text) throw new Error("No text content in result");
  if (!audioText.text.startsWith("{")) {
    throw new Error(audioText.text.slice(0, 200));
  }

  const audioData = JSON.parse(audioText.text);
  if (!audioData.audio_b64) throw new Error("No audio_b64 in response");

  const byteChars = atob(audioData.audio_b64);
  const bytes = new Uint8Array(byteChars.length);
  for (let i = 0; i < byteChars.length; i++) {
    bytes[i] = byteChars.charCodeAt(i);
  }
  return new Blob([bytes], { type: "audio/wav" });
}

// Try each prefix until one works
async function tryCallServerTool(filename) {
  let lastErr;
  for (const prefix of TOOL_PREFIXES) {
    try {
      return await callAudioTool(prefix + "get_audio_data", filename);
    } catch (err) {
      lastErr = err;
      log(prefix + "get_audio_data failed: " + err.message);
    }
  }
  throw lastErr;
}

// Attempt 2: HTTP fetch from the file URL
async function tryFetch(url) {
  log("Trying fetch: " + url);
  const resp = await fetch(url);
  log("fetch status: " + resp.status);
  if (!resp.ok) throw new Error("HTTP " + resp.status);
  return await resp.blob();
}

app.ontoolresult = async ({ content }) => {
  const text = content?.find(c => c.type === "text");
  if (!text?.text) return;

  let data;
  try { data = JSON.parse(text.text); } catch { return; }

  const info = document.getElementById("info");
  const parts = [];
  if (data.voice) parts.push(`Voice: <span>${data.voice}</span>`);
  if (data.instruct) parts.push(`Style: <span>${data.instruct}</span>`);
  if (data.filename) parts.push(`File: <span>${data.filename}</span>`);
  info.innerHTML = parts.join(" &middot; ");

  document.getElementById("status").textContent = "Loading audio...";

  // Try callServerTool first, then fetch fallback
  let blob = null;
  let errors = [];

  try {
    blob = await tryCallServerTool(data.filename);
    log("callServerTool succeeded");
  } catch (err) {
    errors.push("callServerTool: " + err.message);
    log("callServerTool failed: " + err.message);
  }

  if (!blob && data.url) {
    try {
      blob = await tryFetch(data.url);
      log("fetch succeeded");
    } catch (err) {
      errors.push("fetch: " + err.message);
      log("fetch failed: " + err.message);
    }
  }

  if (blob) {
    const blobUrl = URL.createObjectURL(blob);
    setBlobAudio(blobUrl, data.filename);
  } else {
    showError("Could not load audio. " + errors.join(" | "));
  }
};

await app.connect();
</script>
</body>
</html>
